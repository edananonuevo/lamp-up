<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamp Up</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e14;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
  }
  canvas {
    display: block;
    cursor: pointer;
    touch-action: none;
  }
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    letter-spacing: 0.08em;
    pointer-events: none;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">pull the chain</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

const lampAudios = [
  new Audio('sounds/love you.mp3'),
  new Audio('sounds/hwaiting.mp3'),
  new Audio('sounds/believe.mp3'),
  new Audio('sounds/work hard.mp3')
];

let shuffledQueue = [];
// face identifiers
const FACE_DEFAULT = 0;
const FACE_GENTLE  = 1;
const FACE_KISSY   = 2;
const FACE_HAPPY   = 3;

const faces = [FACE_DEFAULT, FACE_GENTLE, FACE_KISSY, FACE_HAPPY];

let currentFace = FACE_DEFAULT;
let faceQueue = [];

// ── sizing ──────────────────────────────────────────────────────────
const W = 420, H = 620;
canvas.width  = W * devicePixelRatio;
canvas.height = H * devicePixelRatio;
canvas.style.width  = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(devicePixelRatio, devicePixelRatio);

// ── lamp geometry (all in logical px) ────────────────────────────────
const CX = W / 2;
const SHADE_TOP_Y   = 135,  SHADE_TOP_W  = 130;
const SHADE_BOT_Y   = 290,  SHADE_BOT_W  = 180;
const POLE_TOP_Y    = 278,  POLE_BOT_Y   = 430, POLE_W = 18;
const BASE_CX       = CX,   BASE_Y       = 430;
const BASE_RX       = 60,   BASE_RY      = 14;
const BASE_RIM_H    = 18;

// chain anchor = center-bottom of shade
const CHAIN_ANCHOR_X = CX-50;
const CHAIN_ANCHOR_Y = SHADE_BOT_Y-10;

// ── state ─────────────────────────────────────────────────────────────
let isOn = false;
let hue  = 25; // orange when on

// restored animation / UI state (required after chain physics changes)
let chainPull = 0;
let isPulling = false;
let pullStartY = 0;

// eye / face animation
let eyeOpenness = 0;   // 0 = closed (off), 1 = open (on)
let mouthSmile  = 0;   // 0 = flat/sleepy, 1 = big smile
let blinkTimer  = 0;
let blinkState  = 1;

// light cone glow
let glowAlpha = 0;

// shade wobble
let shadeWobble = 0;
let shadeWobbleV = 0;

// ── elastic chain physics ────────────────────────────────────────────
const BEAD_R = 7;

// anchor point (fixed)
const anchorX = CHAIN_ANCHOR_X;
const anchorY = CHAIN_ANCHOR_Y;

// rest position (where it wants to return)
const restX = CHAIN_ANCHOR_X;
const restY = SHADE_BOT_Y + 88;

// current bead position
let beadX = restX;
let beadY = restY;

// velocity
let beadVX = 0;
let beadVY = 0;

// interaction
let dragging = false;
let maxLength = 120;     // 🔥 max rope stretch
let pullOffsetX = 0;
let pullOffsetY = 0;
let pullStartX = 0;

// ── spring physics helper ──────────────────────────────────────────────
function spring(val, target, vel, k=0.18, damp=0.72) {
  vel = (vel + (target - val) * k) * damp;
  val = val + vel;
  return [val, vel];
}

// ── color helpers ──────────────────────────────────────────────────────
function lerpColor(c1, c2, t) {
  const p = (s) => parseInt(s,16);
  const r1=p(c1.slice(1,3)),g1=p(c1.slice(3,5)),b1=p(c1.slice(5,7));
  const r2=p(c2.slice(1,3)),g2=p(c2.slice(3,5)),b2=p(c2.slice(5,7));
  const r=Math.round(r1+(r2-r1)*t);
  const g=Math.round(g1+(g2-g1)*t);
  const b=Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

// ── drawing ────────────────────────────────────────────────────────────
function drawLightCone() {
  if (glowAlpha < 0.01) return;
  // align cone to shade horizontal offset (wobble) so it matches shade angle
  const tx = CX + shadeWobble; // top-center of shade (matches drawShade tx)
  const topY = SHADE_BOT_Y;
  const botY = H + 40;
  const spread = 70;
  // bottom shift to exaggerate the angle proportionally
  const bottomShift = shadeWobble * 1.8;

  const grad = ctx.createLinearGradient(tx + bottomShift*0.2, topY, tx + bottomShift, botY);
  const h = hue;
  grad.addColorStop(0,   `hsla(${h},80%,70%,${glowAlpha * 0.55})`);
  grad.addColorStop(0.5, `hsla(${h},80%,60%,${glowAlpha * 0.22})`);
  grad.addColorStop(1,   `hsla(${h},80%,55%,0)`);

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tx - SHADE_BOT_W/2, topY);
  ctx.lineTo(tx + SHADE_BOT_W/2, topY);
  ctx.lineTo(tx + SHADE_BOT_W/2 + spread + bottomShift, botY);
  ctx.lineTo(tx - SHADE_BOT_W/2 - spread + bottomShift, botY);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();

  // floor pool
  const poolCx = CX + shadeWobble * 0.8;
  const pool = ctx.createRadialGradient(poolCx, H - 60, 0, poolCx, H - 60, 130);
  pool.addColorStop(0,   `hsla(${h},80%,65%,${glowAlpha * 0.28})`);
  pool.addColorStop(1,   `hsla(${h},80%,55%,0)`);
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(poolCx, H - 60, 130, 36, 0, 0, Math.PI*2);
  ctx.fillStyle = pool;
  ctx.fill();
  ctx.restore();
}

function drawBase() {
  // rim cylinder
  const rimLeft = isOn ? '#4d4d4d' : '#2a2a2a';
  const rimMid1 = isOn ? '#9e9e9e' : '#5a5a5a';
  const rimMid2 = isOn ? '#7a7a7a' : '#3d3d3d';
  const rimRight = isOn ? '#3f3f3f' : '#1e1e1e';
  const rimGrad = ctx.createLinearGradient(CX - BASE_RX, 0, CX + BASE_RX, 0);
  rimGrad.addColorStop(0,   rimLeft);
  rimGrad.addColorStop(0.3, rimMid1);
  rimGrad.addColorStop(0.7, rimMid2);
  rimGrad.addColorStop(1,   rimRight);

  ctx.save();
  ctx.beginPath();
  ctx.ellipse(BASE_CX, BASE_Y, BASE_RX, BASE_RY, 0, Math.PI, 0); // top arc
  ctx.lineTo(BASE_CX + BASE_RX, BASE_Y + BASE_RIM_H);
  ctx.ellipse(BASE_CX, BASE_Y + BASE_RIM_H, BASE_RX, BASE_RY, 0, 0, Math.PI);
  ctx.closePath();
  ctx.fillStyle = rimGrad;
  ctx.fill();
  ctx.restore();

  // top ellipse
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(BASE_CX, BASE_Y, BASE_RX, BASE_RY, 0, 0, Math.PI*2);
  const topInner = isOn ? '#e0e0e0' : '#888';
  const topOuter = isOn ? '#6a6a6a' : '#2a2a2a';
  const topGrad = ctx.createRadialGradient(CX-10, BASE_Y-4, 2, CX, BASE_Y, BASE_RX);
  topGrad.addColorStop(0, topInner);
  topGrad.addColorStop(1, topOuter);
  ctx.fillStyle = topGrad;
  ctx.fill();
  ctx.restore();
}

function drawPole() {
  const poleLeft = isOn ? '#3a3a3a' : '#1c1c1c';
  const poleMid1 = isOn ? '#8f8f8f' : '#4a4a4a';
  const poleMid2 = isOn ? '#707070' : '#3a3a3a';
  const poleRight = isOn ? '#3d3d3d' : '#161616';
  const poleGrad = ctx.createLinearGradient(CX - POLE_W/2, 0, CX + POLE_W/2, 0);
  poleGrad.addColorStop(0,   poleLeft);
  poleGrad.addColorStop(0.35,poleMid1);
  poleGrad.addColorStop(0.65,poleMid2);
  poleGrad.addColorStop(1,   poleRight);

  ctx.save();
  ctx.beginPath();
  ctx.rect(CX - POLE_W/2, POLE_TOP_Y, POLE_W, POLE_BOT_Y - POLE_TOP_Y);
  ctx.fillStyle = poleGrad;
  ctx.fill();

  // highlight strip
  ctx.beginPath();
  ctx.rect(CX - POLE_W/2 + 4, POLE_TOP_Y, 3, POLE_BOT_Y - POLE_TOP_Y);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fill();
  
  // rounded bottom cap for the pole
  const capRx = POLE_W / 2;
  const capRy = POLE_W * 0.2;
  ctx.beginPath();
  ctx.ellipse(CX, POLE_BOT_Y, capRx, capRy, 0, 0, Math.PI * 2);
  ctx.fillStyle = poleGrad;
  ctx.fill();
  // subtle rim stroke to define edge
  ctx.beginPath();

  ctx.restore();
}

function drawShade(t) {
  // t = 0 off, 1 on (lerped)
  const wobble = shadeWobble;

  // shade off color: dark brownish-gray
  // shade on color: bright teal/green
  const shadeColor = isOn
    ? `hsl(${hue}, 60%, ${55 + t*10}%)`
    : `hsl(30, 8%, ${28 + t*6}%)`;

  const shadeDarkColor = isOn
    ? `hsl(${hue}, 65%, ${35 + t*8}%)`
    : `hsl(30, 6%, 18%)`;

  // trapezoid points (with wobble tilt)
  const tx = CX + wobble;
  const tlx = tx - SHADE_TOP_W/2,  tly = SHADE_TOP_Y;
  const trx = tx + SHADE_TOP_W/2,  try_ = SHADE_TOP_Y;
  const brx = CX + SHADE_BOT_W/2,  bry = SHADE_BOT_Y;
  const blx = CX - SHADE_BOT_W/2,  bly = SHADE_BOT_Y;

  ctx.save();

  // main shade body gradient (left=darker, right=lighter)
  const sideGrad = ctx.createLinearGradient(blx, 0, brx, 0);
  sideGrad.addColorStop(0,    shadeDarkColor);
  sideGrad.addColorStop(0.25, shadeColor);
  sideGrad.addColorStop(0.55, shadeColor);
  sideGrad.addColorStop(0.75, `hsl(${isOn?hue:30}, ${isOn?55:5}%, ${isOn?48:22}%)`);
  sideGrad.addColorStop(1,    shadeDarkColor);

  ctx.beginPath();
  ctx.moveTo(tlx, tly);
  ctx.lineTo(trx, try_);
  ctx.lineTo(brx, bry);
  ctx.lineTo(blx, bly);
  ctx.closePath();
  ctx.fillStyle = sideGrad;
  ctx.fill();

  // inner glow when on
  if (glowAlpha > 0.01) {
    const innerGlow = ctx.createLinearGradient(CX, tly, CX, bry);
    innerGlow.addColorStop(0, `hsla(${hue},90%,85%,${glowAlpha*0.35})`);
    innerGlow.addColorStop(1, `hsla(${hue},90%,75%,${glowAlpha*0.55})`);
    ctx.beginPath();
    ctx.moveTo(tlx, tly); ctx.lineTo(trx, try_);
    ctx.lineTo(brx, bry); ctx.lineTo(blx, bly);
    ctx.closePath();
    ctx.fillStyle = innerGlow;
    ctx.fill();
  }

  // top rim ellipse (match main shade colors)
  ctx.beginPath();
  ctx.ellipse(tx, tly, SHADE_TOP_W/2, 9, 0, 0, Math.PI*2);
  const topRimGrad = ctx.createRadialGradient(tx-8, tly-3, 1, tx, tly, SHADE_TOP_W/2);
  topRimGrad.addColorStop(0, shadeColor);
  topRimGrad.addColorStop(1, shadeDarkColor);
  ctx.fillStyle = topRimGrad;
  ctx.fill();
  

  // bottom rim ellipse
  ctx.beginPath();
  ctx.ellipse(CX, bry, SHADE_BOT_W/2, 13, 0, 0, Math.PI*2);
  const botRimGrad = ctx.createRadialGradient(CX-12, bry-4, 2, CX, bry, SHADE_BOT_W/2);
  botRimGrad.addColorStop(0, isOn ? `hsl(${hue},50%,75%)` : '#4a4a4a');
  botRimGrad.addColorStop(1, isOn ? `hsl(${hue},55%,35%)` : '#1a1a1a');
  ctx.fillStyle = botRimGrad;
  ctx.fill();

  ctx.restore();
}

function nextFace() {
  // refill + reshuffle when empty
  if (faceQueue.length === 0) {
    faceQueue = shuffle([...faces]);
  }

  // take next face
  currentFace = faceQueue.pop();
}

function drawFace(t) {

  const fx = CX + shadeWobble * 0.6;
  const fy = (SHADE_TOP_Y + SHADE_BOT_Y) / 2 + 8;

  // =====================================================
  // OFF STATE
  // =====================================================

  if (!isOn) {

    const eyeSpacing = 32;
    const eyeY = fy - 4;
    const eyeW = 16;
    const archHeight = 8;

    ctx.save();

    ctx.lineWidth = 2.6;
    ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(0,0,0,0.65)';

    // left eye
    ctx.beginPath();
    ctx.moveTo(fx - eyeSpacing - eyeW/2, eyeY);

    ctx.quadraticCurveTo(
      fx - eyeSpacing,
      eyeY + archHeight,
      fx - eyeSpacing + eyeW/2,
      eyeY
    );

    ctx.stroke();

    // right eye
    ctx.beginPath();
    ctx.moveTo(fx + eyeSpacing - eyeW/2, eyeY);

    ctx.quadraticCurveTo(
      fx + eyeSpacing,
      eyeY + archHeight,
      fx + eyeSpacing + eyeW/2,
      eyeY
    );

    ctx.stroke();

    ctx.restore();

    return;
  }

  ctx.save();

  const eyeSpacing = 32;
  const eyeY = fy - 4;

  ctx.lineWidth = 2.6;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#000';

  // =====================================================
  // DEFAULT FACE 😛
  // =====================================================

  if (currentFace === FACE_DEFAULT) {

    const eyeW = 16;
    const archHeight = 8;

    // left eye
    ctx.beginPath();
    ctx.moveTo(fx - eyeSpacing - eyeW/2, eyeY);
    ctx.quadraticCurveTo(
      fx - eyeSpacing,
      eyeY - archHeight,
      fx - eyeSpacing + eyeW/2,
      eyeY
    );
    ctx.stroke();

    // right eye
    ctx.beginPath();
    ctx.moveTo(fx + eyeSpacing - eyeW/2, eyeY);
    ctx.quadraticCurveTo(
      fx + eyeSpacing,
      eyeY - archHeight,
      fx + eyeSpacing + eyeW/2,
      eyeY
    );
    ctx.stroke();

    // tongue mouth
    const mx = fx;
    const my = fy + 10;
    const mouthR = 18 + mouthSmile * 6;

    ctx.save();

    ctx.beginPath();
    ctx.moveTo(mx - mouthR, my);
    ctx.arc(mx, my, mouthR, 0, Math.PI);
    ctx.closePath();
    ctx.clip();

    ctx.beginPath();
    ctx.arc(mx, my, mouthR, 0, Math.PI);
    ctx.closePath();
    ctx.fillStyle = '#111';
    ctx.fill();

    const tongueR = mouthR * 0.45;

    const tongueX = mx + mouthR * 0.35;
    const tongueY = my + mouthR * 0.8;

    ctx.beginPath();
    ctx.ellipse(
      tongueX,
      tongueY,
      tongueR,
      tongueR * 0.85,
      0,
      0,
      Math.PI * 2
    );
    ctx.fillStyle = 'rgba(255,100,140,0.95)';
    ctx.fill();

    ctx.restore();
  }

  // =====================================================
  // GENTLE FACE 😌
  // =====================================================

  else if (currentFace === FACE_GENTLE) {

    const eyeSpacing = 32;
    const eyeY = fy - 4;

    ctx.save();

    // ── BIG HEART EYES ─────────────────────────────
    function drawHeart(x, y, size) {
      ctx.beginPath();
      const s = size;

      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x - s, y - s,
                        x - s * 1.5, y + s * 0.3,
                        x, y + s);

      ctx.bezierCurveTo(x + s * 1.5, y + s * 0.3,
                        x + s, y - s,
                        x, y);

      ctx.fill();
    }

    ctx.fillStyle = 'rgba(255,100,140,0.95)';

    drawHeart(fx - eyeSpacing, eyeY, 12);  // bigger than normal
    drawHeart(fx + eyeSpacing, eyeY, 12);

    // ── OPEN MOUTH (no blush) ──────────────────────
    const mx = fx;
    const my = fy + 18;

    const mouthR = (18 + mouthSmile * 6) * 2;

    ctx.beginPath();

    // bottom half ellipse (smile/gasp shape)
    ctx.ellipse(
      mx,
      my,
      mouthR / 2,
      mouthR / 2,
      0,
      0,
      Math.PI
    );

    // optional: close bottom so it looks like a filled mouth cavity
    ctx.lineTo(mx + mouthR / 2, my);
    ctx.lineTo(mx - mouthR / 2, my);
    ctx.closePath();

    ctx.fillStyle = '#111';
    ctx.fill();

    ctx.restore();
  }

  // =====================================================
  // KISSY FACE 😘
  // =====================================================

  else if (currentFace === FACE_KISSY) {

    const eyeW = 18;

    // left eye closed
    ctx.beginPath();
    ctx.moveTo(fx - eyeSpacing - eyeW/2, eyeY);
    ctx.quadraticCurveTo(
      fx - eyeSpacing,
      eyeY - 7,
      fx - eyeSpacing + eyeW/2,
      eyeY
    );
    ctx.stroke();

    // wink
    ctx.beginPath();
    ctx.moveTo(fx + eyeSpacing - 6, eyeY);
    ctx.lineTo(fx + eyeSpacing + 6, eyeY);
    ctx.stroke();

    // kiss mouth
    const mx = fx;
    const my = fy + 20;

    ctx.beginPath();
    ctx.arc(mx, my, 5, 0, Math.PI * 2);
    ctx.stroke();

    // cheek blush
    ctx.fillStyle = 'rgba(255,120,140,0.35)';

    ctx.beginPath();
    ctx.ellipse(
      fx - 18,
      fy + 10,
      10,
      5,
      0,
      0,
      Math.PI * 2
    );
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(
      fx + 18,
      fy + 10,
      10,
      5,
      0,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }

  // =====================================================
  // HAPPY FACE 😊
  // =====================================================

  else if (currentFace === FACE_HAPPY) {

    const eyeW = 16;

    // smiling eyes
    ctx.beginPath();
    ctx.moveTo(fx - eyeSpacing - eyeW/2, eyeY);
    ctx.quadraticCurveTo(
      fx - eyeSpacing,
      eyeY - 10,
      fx - eyeSpacing + eyeW/2,
      eyeY
    );
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(fx + eyeSpacing - eyeW/2, eyeY);
    ctx.quadraticCurveTo(
      fx + eyeSpacing,
      eyeY - 10,
      fx + eyeSpacing + eyeW/2,
      eyeY
    );
    ctx.stroke();

    const mx = fx;
    const my = fy + 18;

    ctx.beginPath();
    ctx.arc(
      mx,
      my,
      18,
      0.15,
      Math.PI - 0.15
    );
    ctx.stroke();

    // blush
    ctx.fillStyle = 'rgba(255,120,120,0.25)';

    ctx.beginPath();
    ctx.ellipse(
      fx - 22,
      fy + 8,
      9,
      5,
      0,
      0,
      Math.PI * 2
    );
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(
      fx + 22,
      fy + 8,
      9,
      5,
      0,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }

  ctx.restore();
}

function drawChain() {
  const ax = CHAIN_ANCHOR_X;
  const ay = CHAIN_ANCHOR_Y;
  const bx = beadX;
  const by = beadY;

  // chain string — segmented for catenary feel
  const segs = 12;
  ctx.save();
  ctx.strokeStyle = 'rgba(200,190,170,0.85)';
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  // slight sag curve
  const midX = ax + (bx-ax)*0.5;
  const midY = ay + (by-ay)*0.5 + Math.abs(shadeWobble)*0.3;
  ctx.quadraticCurveTo(midX + shadeWobble*0.15, midY, bx, by - BEAD_R);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // bead
  ctx.save();
  const beadGrad = ctx.createRadialGradient(bx-2, by-3, 1, bx, by, BEAD_R);
  beadGrad.addColorStop(0, '#ddd');
  beadGrad.addColorStop(0.5,'#aaa');
  beadGrad.addColorStop(1, '#555');
  ctx.beginPath();
  ctx.arc(bx, by, BEAD_R, 0, Math.PI*2);
  ctx.fillStyle = beadGrad;
  ctx.fill();
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.stroke();

  // highlight
  ctx.beginPath();
  ctx.arc(bx - 2, by - 2, 2.2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();
  ctx.restore();
}

// ── ambient background glow ────────────────────────────────────────────
function drawBackground() {
  ctx.clearRect(0, 0, W, H);
  // base dark
  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, W, H);

  if (glowAlpha > 0.01) {
    const amb = ctx.createRadialGradient(CX, H*0.5, 20, CX, H*0.5, 280);
    amb.addColorStop(0,   `hsla(${hue},50%,25%,${glowAlpha*0.18})`);
    amb.addColorStop(1,   `hsla(${hue},40%,15%,0)`);
    ctx.fillStyle = amb;
    ctx.fillRect(0, 0, W, H);
  }
}

// ── audio ──────────────────────────────────────────────────────────────
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));

    [array[i], array[j]] =
    [array[j], array[i]];
  }

  return array;
}

function playRandomLampAudio() {
  if (shuffledQueue.length === 0) {
    shuffledQueue = shuffle(
      [...Array(lampAudios.length).keys()]
    );
  }

  const index = shuffledQueue.pop();

  lampAudios[index].currentTime = 0;
  lampAudios[index].play();
}

// ── toggle ──────────────────────────────────────────────────────────────
function toggle() {
  isOn = !isOn;
  // randomize hue slightly
  // set to orange
  hue = 30;
  // shade wobble kick
  shadeWobbleV += (Math.random() - 0.5) * 12;

  if (isOn) {
    playRandomLampAudio();
    nextFace();
  }
}

// ── pointer handling ───────────────────────────────────────────────────
function getY(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) return (e.touches[0].clientY - rect.top);
  return e.clientY - rect.top;
}
function getX(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) return (e.touches[0].clientX - rect.left);
  return e.clientX - rect.left;
}
function isNearBead(x, y) {
  return Math.hypot(x - CHAIN_ANCHOR_X, y - beadY) < 26;
}

canvas.addEventListener('pointerdown', (e) => {
  const x = getX(e), y = getY(e);

  if (Math.hypot(x - beadX, y - beadY) < 26) {
    dragging = true;
    pullStartX = x;
    pullStartY = y;
    canvas.setPointerCapture(e.pointerId);
    hint.style.opacity = '0';
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (!dragging) return;

  let x = getX(e);
  let y = getY(e);

  let dx = x - anchorX;
  let dy = y - anchorY;

  let dist = Math.hypot(dx, dy);

  // 🔥 clamp to max rope length (elastic constraint)
  if (dist > maxLength) {
    dx = (dx / dist) * maxLength;
    dy = (dy / dist) * maxLength;
    dist = maxLength;
  }

  // target position (where user is pulling)
  beadX = anchorX + dx;
  beadY = anchorY + dy;
});

canvas.addEventListener('pointerup', () => {
  if (!dragging) return;
  dragging = false;

  let dist = Math.hypot(beadX - anchorX, beadY - anchorY);

  if (dist > 35) {
    toggle();
  }
});

canvas.addEventListener('pointercancel', () => { dragging = false; chainPull = 0; });

// ── main loop ──────────────────────────────────────────────────────────
let lastT = 0;
function loop(ts) {
  const dt = Math.min((ts - lastT) / 16.67, 3);
  lastT = ts;

  // ── elastic spring back to rest position ─────────────────────────────
  if (!dragging) {

    // spring force toward rest position
    const dx = restX - beadX;
    const dy = restY - beadY;

    beadVX += dx * 0.12;
    beadVY += dy * 0.12;

    // damping
    beadVX *= 0.75;
    beadVY *= 0.75;

    beadX += beadVX * dt;
    beadY += beadVY * dt;
  }

  // shade wobble
  shadeWobble += shadeWobbleV * dt;
  shadeWobbleV += -shadeWobble * 0.12;
  shadeWobbleV *= 0.78;
  if (Math.abs(shadeWobble) < 0.05) shadeWobble = 0;

  // eye / mouth / glow animation
  const targetEye   = isOn ? 1 : 0;
  const targetMouth = isOn ? 1 : 0;
  const targetGlow  = isOn ? 1 : 0;
  [eyeOpenness]  = spring(eyeOpenness, targetEye,   0,  0.09, 0.78);
  [mouthSmile]   = spring(mouthSmile,  targetMouth, 0,  0.09, 0.78);
  [glowAlpha]    = spring(glowAlpha,   targetGlow,  0,  0.07, 0.82);

  // blink when on
  blinkTimer++;
  if (blinkTimer > 200 + Math.random()*120 && isOn) {
    blinkTimer = 0;
    blinkState = 0;
  }
  if (blinkState < 0.5) {
    blinkState += 0.18;
  } else {
    blinkState = Math.min(blinkState + 0.22, 1);
  }

  // ── draw ──────────────────────────────────────────────────────────
  const t = glowAlpha;

  drawBackground();
  drawLightCone();
  drawBase();
  
  drawShade(t);
  drawPole();
  drawFace(t);
  drawChain();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
